    <script>
        // 检测TailwindCSS加载状态
        document.addEventListener('DOMContentLoaded', function() {
            const testElement = document.createElement('div');
            testElement.className = 'bg-blue-500';
            testElement.style.position = 'absolute';
            testElement.style.visibility = 'hidden';
            document.body.appendChild(testElement);
            
            const computedStyle = window.getComputedStyle(testElement);
            if (computedStyle.backgroundColor === 'rgb(59, 130, 246)') {
                document.body.classList.add('tailwind-loaded');
                console.log('✅ TailwindCSS 加载成功');
            } else {
                console.log('⚠️ TailwindCSS 加载失败，使用备用样式');
            }
            
            document.body.removeChild(testElement);
        });
    </script>

    <script>
        // 全局变量
        let authToken = localStorage.getItem('authToken');
        let currentUser = null;
        let allPoems = [];
        let filteredPoems = [];
        const API_BASE = '/api';

        // 难度配置
        const difficultyConfig = {
            1: { name: '入门', icon: 'fa-seedling', color: 'green' },
            2: { name: '初级', icon: 'fa-leaf', color: 'blue' },
            3: { name: '中级', icon: 'fa-tree', color: 'yellow' },
            4: { name: '高级', icon: 'fa-mountain', color: 'red' },
            5: { name: '专家', icon: 'fa-crown', color: 'purple' }
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            if (authToken) {
                checkAuthStatus();
            }
            loadPoems();
            setupEventListeners();
        });

        // 设置事件监听器
        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', filterPoems);
            document.getElementById('dynastyFilter').addEventListener('change', filterPoems);
            document.getElementById('authorFilter').addEventListener('change', filterPoems);
            
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('registerForm').addEventListener('submit', handleRegister);
        }

        // 检查认证状态
        async function checkAuthStatus() {
            try {
                const response = await fetch(`${API_BASE}/auth/profile`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                if (response.ok) {
                    currentUser = await response.json();
                    updateUserUI();
                } else {
                    localStorage.removeItem('authToken');
                    authToken = null;
                }
            } catch (error) {
                console.error('认证检查失败:', error);
            }
        }

        // 更新用户界面
        function updateUserUI() {
            const userInfo = document.getElementById('userInfo');
            const authButtons = document.getElementById('authButtons');
            
            if (currentUser) {
                document.getElementById('username').textContent = currentUser.username;
                userInfo.classList.remove('hidden');
                authButtons.classList.add('hidden');
            } else {
                userInfo.classList.add('hidden');
                authButtons.classList.remove('hidden');
            }
        }

        // 加载古诗数据
        async function loadPoems() {
            try {
                const response = await fetch(`${API_BASE}/poems?per_page=100`);
                const data = await response.json();
                
                if (response.ok) {
                    allPoems = data.poems;
                    filteredPoems = [...allPoems];
                    
                    updateStatistics();
                    populateFilters();
                    displayPoemsByDifficulty();
                    
                    console.log(`加载了 ${allPoems.length} 首古诗`);
                } else {
                    console.error('加载古诗失败:', data.error);
                }
            } catch (error) {
                console.error('加载古诗错误:', error);
            }
        }

        // 更新统计信息
        function updateStatistics() {
            const totalPoems = allPoems.length;
            const dynasties = [...new Set(allPoems.map(p => p.dynasty))];
            const authors = [...new Set(allPoems.map(p => p.author))];
            const avgDifficulty = (allPoems.reduce((sum, p) => sum + p.difficulty_level, 0) / totalPoems).toFixed(1);
            
            document.getElementById('totalPoems').textContent = totalPoems;
            document.getElementById('dynastyCount').textContent = dynasties.length;
            document.getElementById('authorCount').textContent = authors.length;
            document.getElementById('avgDifficulty').textContent = avgDifficulty;
        }

        // 填充筛选器选项
        function populateFilters() {
            const dynastyFilter = document.getElementById('dynastyFilter');
            const authorFilter = document.getElementById('authorFilter');
            
            // 朝代选项
            const dynasties = [...new Set(allPoems.map(p => p.dynasty))].sort();
            dynasties.forEach(dynasty => {
                const option = document.createElement('option');
                option.value = dynasty;
                option.textContent = dynasty;
                dynastyFilter.appendChild(option);
            });
            
            // 作者选项
            const authors = [...new Set(allPoems.map(p => p.author))].sort();
            authors.forEach(author => {
                const option = document.createElement('option');
                option.value = author;
                option.textContent = author;
                authorFilter.appendChild(option);
            });
        }

        // 筛选古诗
        function filterPoems() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const dynasty = document.getElementById('dynastyFilter').value;
            const author = document.getElementById('authorFilter').value;
            
            filteredPoems = allPoems.filter(poem => {
                const matchSearch = !search || 
                    poem.title.toLowerCase().includes(search) ||
                    poem.author.toLowerCase().includes(search) ||
                    poem.content.toLowerCase().includes(search);
                
                const matchDynasty = !dynasty || poem.dynasty === dynasty;
                const matchAuthor = !author || poem.author === author;
                
                return matchSearch && matchDynasty && matchAuthor;
            });
            
            displayPoemsByDifficulty();
        }

        // 清除筛选
        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('dynastyFilter').value = '';
            document.getElementById('authorFilter').value = '';
            filteredPoems = [...allPoems];
            displayPoemsByDifficulty();
        }

        // 按难度显示古诗
        function displayPoemsByDifficulty() {
            const container = document.getElementById('poemsByDifficulty');
            container.innerHTML = '';
            
            console.log('显示古诗，总数:', filteredPoems.length);
            
            // 按难度分组
            const poemsByLevel = {};
            for (let i = 1; i <= 5; i++) {
                poemsByLevel[i] = filteredPoems.filter(p => p.difficulty_level === i);
                console.log(`难度${i}:`, poemsByLevel[i].length, '首');
            }
            
            // 为每个难度级别创建卡片
            for (let level = 1; level <= 5; level++) {
                const poems = poemsByLevel[level];
                if (poems.length === 0) {
                    console.log(`跳过难度${level}，无古诗`);
                    continue;
                }
                
                const config = difficultyConfig[level];
                const levelCard = document.createElement('div');
                levelCard.className = `difficulty-card difficulty-${level} rounded-xl p-6 mb-8`;
                
                levelCard.innerHTML = `
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-2xl font-bold text-gray-800">
                            <i class="fas ${config.icon} mr-2"></i>
                            难度${level} - ${config.name}
                        </h2>
                        <span class="bg-white bg-opacity-80 px-3 py-1 rounded-full text-sm font-medium">
                            ${poems.length} 首
                        </span>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="poems-level-${level}">
                    </div>
                `;
                
                container.appendChild(levelCard);
                
                // 添加该难度的古诗
                const poemsGrid = document.getElementById(`poems-level-${level}`);
                poems.forEach(poem => {
                    const poemCard = document.createElement('div');
                    poemCard.className = 'poem-card bg-white rounded-lg p-4 shadow-md hover:shadow-lg';
                    poemCard.onclick = () => openPoem(poem.id);
                    
                    // 安全处理内容和标签
                    const content = poem.content || '暂无内容';
                    const contentPreview = content.length > 50 ? content.substring(0, 50) + '...' : content;
                    
                    let tagsText = '经典';
                    try {
                        if (poem.tags) {
                            const tags = JSON.parse(poem.tags);
                            tagsText = Array.isArray(tags) ? tags.slice(0, 2).join(' · ') : '经典';
                        }
                    } catch (e) {
                        console.warn('解析标签失败:', poem.tags);
                    }
                    
                    poemCard.innerHTML = `
                        <h3 class="font-bold text-lg mb-2 text-gray-800">${poem.title || '未知标题'}</h3>
                        <p class="text-gray-600 text-sm mb-2">${poem.author || '未知作者'} · ${poem.dynasty || '未知朝代'}</p>
                        <p class="text-gray-500 text-xs line-clamp-2 mb-3">${contentPreview}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-xs bg-gray-100 text-gray-700 px-2 py-1 rounded">
                                ${tagsText}
                            </span>
                            <i class="fas fa-arrow-right text-blue-500"></i>
                        </div>
                    `;
                    
                    poemsGrid.appendChild(poemCard);
                });
                
                console.log(`难度${level}卡片创建完成，包含${poems.length}首古诗`);
            }
            
            if (container.children.length === 0) {
                container.innerHTML = '<div class="text-center py-12 text-gray-500">没有找到符合条件的古诗</div>';
            }
        }

        // 打开古诗学习页面
        function openPoem(poemId) {
            window.location.href = `/poem/${poemId}`;
        }

        // 显示登录模态框
        function showLogin() {
            document.getElementById('loginModal').classList.remove('hidden');
            document.getElementById('loginModal').classList.add('flex');
        }

        // 隐藏登录模态框
        function hideLogin() {
            document.getElementById('loginModal').classList.add('hidden');
            document.getElementById('loginModal').classList.remove('flex');
        }

        // 显示注册模态框
        function showRegister() {
            document.getElementById('registerModal').classList.remove('hidden');
            document.getElementById('registerModal').classList.add('flex');
        }

        // 隐藏注册模态框
        function hideRegister() {
            document.getElementById('registerModal').classList.add('hidden');
            document.getElementById('registerModal').classList.remove('flex');
        }

        // 切换到注册
        function switchToRegister() {
            hideLogin();
            showRegister();
        }

        // 切换到登录
        function switchToLogin() {
            hideRegister();
            showLogin();
        }

        // 处理登录
        async function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    authToken = data.token;
                    localStorage.setItem('authToken', authToken);
                    currentUser = data.user;
                    updateUserUI();
                    hideLogin();
                    alert('登录成功！');
                } else {
                    alert('登录失败: ' + data.error);
                }
            } catch (error) {
                alert('登录错误: ' + error.message);
            }
        }

        // 处理注册
        async function handleRegister(e) {
            e.preventDefault();
            
            const username = document.getElementById('registerUsername').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const passwordConfirm = document.getElementById('registerPasswordConfirm').value;
            
            // 验证密码匹配
            if (password !== passwordConfirm) {
                alert('两次输入的密码不一致！');
                return;
            }
            
            // 验证密码长度
            if (password.length < 6) {
                alert('密码长度至少为6位！');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    authToken = data.token;
                    localStorage.setItem('authToken', authToken);
                    currentUser = data.user;
                    updateUserUI();
                    hideRegister();
                    alert('注册成功！欢迎 ' + username);
                } else {
                    alert('注册失败: ' + data.error);
                }
            } catch (error) {
                alert('注册错误: ' + error.message);
            }
        }

        // 退出登录
        function logout() {
            authToken = null;
            currentUser = null;
            localStorage.removeItem('authToken');
            updateUserUI();
            alert('已退出登录');
        }
    </script>
</body>
</html>
